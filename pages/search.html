<!doctype html>
<html lang="en">
  <head>
    <title>My BCIT Project</title>

    <!-- Required meta tags -->
    <meta name="comp1800 template" content="My 1800 App" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Web Components for shared navbar and footer layout -->
    <link rel="stylesheet" href="/styles/style.css" />
    <script type="module" src="/src/components/site-navbar.js"></script>
    <script type="module" src="/src/components/site-footer.js"></script>
  </head>

  <body>
    <!------------------------------>
    <!-- Your HTML Layout go here -->
    <!------------------------------>
    <!-- our own navbar goes here -->

    <site-navbar></site-navbar>
    <div class="container-fluid bg-light text-dark p-5">
      <div class="container bg-light p-5">
        <!-- Page title -->
        <h1 class="display-4" style="text-align: center">Search</h1>

        <hr />

        <!-- Search form group -->
        <div class="form-group">
          <br />

          <!-- Search input -->
          <div class="input-group mb-3">
            <div class="input-group-prepend">
              <span class="input-group-text" id="destination-addon">🔍</span>
            </div>

            <!-- Destination input -->
            <input
              type="text"
              id="destinationInput"
              class="form-control"
              placeholder="Enter your destination"
              aria-label="Destination"
              aria-describedby="destination-addon"
            />
          </div>
          <ul id="suggestions" class="list-group"></ul>
        </div>

        <!-- Buttons section -->
        <div class="card-body d-flex justify-content-center gap-2">
          <!-- Search button (writes route to Firestore) -->
          <button id="searchRouteBtn" class="btn btn-primary">Search</button>

          <!-- Post crowd level page -->
          <a href="./post.html" class="btn btn-primary"> Post Crowd-Level </a>

          <!-- View crowd reports -->
          <a href="./reports.html" class="btn btn-primary">
            View Crowd-Levels
          </a>
        </div>
      </div>
    </div>

    <!-- our own footer goes here -->

    <site-footer></site-footer>

    <!---------------------------------------------->
    <!-- Your own JavaScript scripts go here      -->
    <!---------------------------------------------->

    <script type="module" src="/src/app.js"></script>
  </body>
</html>
