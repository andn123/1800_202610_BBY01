<!doctype html>
<html lang="en">
  <head>
    <title>My BCIT Project</title>
    <meta name="comp1800 template" content="My 1800 App" />

    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Web Components for shared navbar and footer layout -->
    <link rel="stylesheet" href="../styles/style.css" />
    <script type="module" src="/src/components/site-navbar.js"></script>
    <script type="module" src="/src/components/site-footer.js"></script>
  </head>

  <body>
    <!------------------------------>
    <!-- Your HTML Layout go here -->
    <!------------------------------>

    <!-- our own navbar goes here -->
    <site-navbar></site-navbar>
    <!-- Main content goes here -->
    <div
      class="container vh-100 d-flex justify-content-center align-items-center"
    >
      <div class="col-md-6 col-lg-4">
        <form id="report-form" class="card p-4 shadow">
          <div class="mb-3">
            <label class="form-label">Location Name:</label>
            <input id="location" type="text" class="form-control" required />
          </div>

          <div class="mb-3">
            <label class="form-label">Address:</label>
            <input id="address" type="text" class="form-control" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Upload Image:</label>
            <input
              type="file"
              class="form-control"
              id="inputImage"
              accept="image/*"
              required
            />
          </div>
          <div class="mb-3">
            <label class="form-label">Crowd Level:</label>
            <div class="form-check">
              <input
                class="form-check-input"
                type="radio"
                name="crowd_level"
                id="quiet"
                value="quiet"
                required
              />
              <label class="form-check-label" for="quiet">Quiet</label>
            </div>
            <div class="form-check">
              <input
                class="form-check-input"
                type="radio"
                name="crowd_level"
                id="normal"
                value="normal"
              />
              <label class="form-check-label" for="normal">Normal</label>
            </div>
            <div class="form-check">
              <input
                class="form-check-input"
                type="radio"
                name="crowd_level"
                id="busy"
                value="busy"
              />
              <label class="form-check-label" for="busy">Busy</label>
            </div>
          </div>
          <button class="btn btn-primary w-100">Submit</button>
        </form>
      </div>
    </div>

    <!-- our own footer goes here -->
    <site-footer></site-footer>
    <!---------------------------------------------->
    <!-- Your own JavaScript scripts go here      -->
    <!---------------------------------------------->

    <script type="module" src="/src/app.js"></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
