<!doctype html>
<html lang="en">
  <head>
    <title>Report</title>
    <link href="/images/ir-logo.png" rel="icon" type="image/x-icon" />
    <meta name="comp1800 template" content="My 1800 App" />

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="../styles/style.css" />
    <script type="module" src="/src/components/site-navbar.js"></script>
    <script type="module" src="/src/components/site-footer.js"></script>
  </head>

  <body>
    <site-navbar></site-navbar>

    <div
      class="container vh-100 d-flex justify-content-center align-items-center"
    >
      <div class="col-md-6 col-lg-4">
        <form id="report-form" class="card p-4 shadow">
          <div class="mb-3 position-relative">
            <label class="form-label">Select Location:</label>

            <input
              type="text"
              id="locationSearch"
              class="form-control"
              placeholder="Search location..."
              autocomplete="off"
              required
            />

            <div
              id="locationDropdown"
              class="list-group position-absolute w-100 shadow"
              style="z-index: 1000; max-height: 200px; overflow-y: auto"
            ></div>
          </div>

          <div class="mb-3">
            <label class="form-label">Upload Image:</label>
            <input
              type="file"
              class="form-control"
              id="inputImage"
              accept="image/*"
              required
            />
          </div>

          <div class="mb-3">
            <label class="form-label">Crowd Level:</label>

            <div class="form-check">
              <input
                class="form-check-input"
                type="radio"
                name="crowd_level"
                value="quiet"
                required
              />
              <label class="form-check-label">Quiet</label>
            </div>

            <div class="form-check">
              <input
                class="form-check-input"
                type="radio"
                name="crowd_level"
                value="normal"
              />
              <label class="form-check-label">Normal</label>
            </div>

            <div class="form-check">
              <input
                class="form-check-input"
                type="radio"
                name="crowd_level"
                value="busy"
              />
              <label class="form-check-label">Busy</label>
            </div>
          </div>

          <button class="btn btn-primary w-100">Submit</button>
        </form>
      </div>
    </div>

    <site-footer></site-footer>

    <!-- JS -->
    <script type="module" src="/src/app.js"></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
