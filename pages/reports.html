<!doctype html>
<html lang="en">
  <head>
    <title>My BCIT Project</title>
    <meta name="comp1800 template" content="My 1800 App" />

    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../styles/style.css" />
    <script type="module" src="/src/components/site-navbar.js"></script>
    <script type="module" src="/src/components/site-footer.js"></script>
  </head>

  <body>
    <site-navbar></site-navbar>

    <div class="container-fluid bg-light text-dark p-5">
      <h1>Crowd-Level Reports</h1>

      <!-- Loading message -->
      <div id="loadingMessage" class="alert alert-info" style="display: none">
        Loading reports...
      </div>

      <!-- Error message -->
      <div
        id="errorMessage"
        class="alert alert-danger"
        style="display: none"
      ></div>

      <!-- SEARCH + SORT -->
      <input
        type="text"
        id="searchInput"
        placeholder="Search location..."
        class="form-control mb-2"
      />

      <select id="sortSelect" class="form-select mb-3">
        <option value="recent">Most Recent</option>
        <option value="crowded">Most Crowded</option>
      </select>

      <!-- No results message -->
      <div
        id="noResultsMessage"
        class="alert alert-warning"
        style="display: none"
      >
        No reports found.
      </div>

      <!-- existing container -->
      <div id="crowd-reports" class="row row-cols-1 row-cols-md-3 g-4"></div>
    </div>

    <!-- template -->
    <template id="crowdCardTemplate">
      <div class="col">
        <div class="card h-100">
          <img
            class="card-img-top card-image card-img-fixed"
            src="..."
            alt="Destination Image"
          />
          <div class="card-body d-flex flex-column">
            <h5 class="card-title"></h5>
            <p class="card-text">
              <span class="report-address"></span><br />
              <span class="report-crowd"></span><br />
              <span class="report-created-at"></span><br />
              <span class="report-created-by"></span>
            </p>
          </div>
        </div>
      </div>
    </template>

    <site-footer></site-footer>

    <script type="module" src="/src/app.js"></script>
    <script type="module" src="/src/reportsPage.js"></script>
  </body>
</html>
