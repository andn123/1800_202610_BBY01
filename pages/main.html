<!doctype html>
<html lang="en">
  <head>
    <title>My BCIT Project</title>
    <meta name="comp1800 template" content="My 1800 App" />

    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Web Components for shared navbar and footer layout -->
    <link rel="stylesheet" href="../styles/style.css" />
    <script type="module" src="/src/components/site-navbar.js"></script>
    <script type="module" src="/src/components/site-footer.js"></script>
  </head>

  <body>
    <!------------------------------>
    <!-- Your HTML Layout go here -->
    <!------------------------------>

    <!-- our own navbar goes here -->
    <site-navbar></site-navbar>
    <!-- Main content goes here -->
    <div class="container-fluid bg-light text-dark p-5">
      <div class="container bg-light p-5">
        <h1 class="display-4">
          Good morning <span id="name-goes-here">friend </span>
        </h1>
        <hr />
        <p>Select search to get directions to your destination.</p>
      </div>
    </div>
    <div class="container-fluid bg-light text-dark p-5">
      <div class="container bg-light p-5">
        <h1>Your Crowd-Level Reports</h1>
        <div
          id="my-crowd-reports"
          class="row row-cols-1 row-cols-md-3 g-4"
        ></div>
      </div>
    </div>
    <template id="myCrowdCardTemplate">
      <div class="col">
        <div class="card h-100">
          <img
            class="card-img-top card-image card-img-fixed"
            src="..."
            alt="Destination Image"
          />
          <div class="card-body d-flex flex-column">
            <h5 class="card-title"></h5>
            <p class="card-text">
              <span class="report-address"></span><br />
              <span class="report-crowd"></span><br />
              <span class="report-created-at"></span><br />
              <span class="report-created-by"></span>
            </p>
          </div>
        </div>
      </div>
    </template>
    <!-- our own footer goes here -->
    <site-footer></site-footer>
    <!---------------------------------------------->
    <!-- Your own JavaScript scripts go here      -->
    <!---------------------------------------------->

    <script type="module" src="/src/app.js"></script>
    <script type="module" src="/src/main.js"></script>
    <script type="module" src="/src/myReportsPage.js"></script>
  </body>
</html>
